<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg-top: #133b2c;
            --bg-bottom: #0a1b14;
            --panel: #1f2f1f;
            --edge: #d1b04f;
            --text: #f7f0cf;
            --timer: #f5d97a;
            --start: #5f9a52;
            --pause: #d1b04f;
            --reset: #a3472d;
            --active: #3e7f49;
            --card-top: #2a3d27;
            --title: #e7c566;
            --title-glow: rgba(231, 197, 102, 0.65);
            --control-border: #f2da98;
            --control-text: #1a160b;
            --control-base: #e8dfb8;
            --label: #f2da98;
            --input-bg: #f7f0cf;
            --input-text: #1a160b;
            --list-bg: rgba(247, 240, 207, 0.1);
            --list-border: rgba(242, 218, 152, 0.34);
            --list-text: #f5e7bc;
            --modal-overlay: rgba(10, 12, 10, 0.72);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
            background:
                radial-gradient(circle at 20% 25%, rgba(179, 219, 130, 0.2), transparent 40%),
                radial-gradient(circle at 80% 75%, rgba(209, 176, 79, 0.2), transparent 45%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.03) 0,
                rgba(255, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 5px
            );
            opacity: 0.35;
        }

        .timer-container {
            width: min(92vw, 520px);
            background: linear-gradient(180deg, var(--card-top) 0%, var(--panel) 100%);
            padding: 34px 30px;
            border: 3px solid var(--edge);
            border-radius: 10px;
            box-shadow:
                0 0 0 3px rgba(209, 176, 79, 0.24),
                0 0 40px rgba(209, 176, 79, 0.25),
                0 24px 34px rgba(0, 0, 0, 0.48);
            text-align: center;
            margin: 20px;
        }

        h1 {
            margin: 0 0 20px;
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(1rem, 2.4vw, 1.3rem);
            line-height: 1.5;
            letter-spacing: 1px;
            color: var(--title);
            text-shadow: 0 0 12px var(--title-glow);
        }

        .theme-nav {
            width: min(92vw, 760px);
            margin: 14px 0 6px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }

        .theme-btn {
            font-family: 'Press Start 2P', monospace;
            border: 2px solid var(--edge);
            border-radius: 7px;
            background: var(--control-base);
            color: var(--control-text);
            cursor: pointer;
            padding: 8px 10px;
            font-size: 0.48rem;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(209, 176, 79, 0.2);
            transition: transform 0.12s ease, filter 0.2s ease;
        }

        .theme-btn.active {
            background: var(--active);
            color: var(--text);
            text-shadow: 0 0 8px rgba(62, 127, 73, 0.45);
        }

        #timerDisplay {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(2rem, 8vw, 3.6rem);
            margin: 24px 0;
            letter-spacing: 3px;
            color: var(--timer);
            text-shadow:
                0 0 5px rgba(245, 217, 122, 0.9),
                0 0 18px rgba(245, 217, 122, 0.65),
                2px 0 0 rgba(163, 71, 45, 0.35),
                -2px 0 0 rgba(95, 154, 82, 0.35);
            animation: flicker 2.8s infinite steps(2);
        }

        .controls {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .controls button,
        .mode-selector button {
            font-family: 'Press Start 2P', monospace;
            text-transform: uppercase;
            border: 2px solid var(--control-border);
            border-radius: 7px;
            color: var(--control-text);
            cursor: pointer;
            transition: transform 0.12s ease, filter 0.2s ease;
            box-shadow: 0 0 10px rgba(209, 176, 79, 0.2);
        }

        .controls button {
            padding: 13px 16px;
            font-size: 0.62rem;
            letter-spacing: 0.4px;
        }

        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .mode-selector button {
            padding: 11px 14px;
            font-size: 0.56rem;
            background: var(--control-base);
        }

        .mode-selector button.active {
            background: var(--active);
            color: #fef7da;
            text-shadow: 0 0 8px rgba(62, 127, 73, 0.45);
        }

        #testModeBtn {
            background: #7a6530;
            color: #f7f0cf;
        }

        #testModeBtn.active {
            background: #3e7f49;
            color: #fef7da;
            text-shadow: 0 0 8px rgba(62, 127, 73, 0.45);
        }

        .session-meta {
            margin: 8px 0 14px;
            text-align: left;
        }

        .session-meta label {
            display: block;
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: var(--label);
            letter-spacing: 0.4px;
        }

        .session-meta input {
            width: 100%;
            border: 2px solid var(--control-border);
            border-radius: 7px;
            background: var(--input-bg);
            color: var(--input-text);
            padding: 10px 12px;
            font-size: 1.15rem;
            font-family: 'VT323', monospace;
            outline: none;
        }

        .session-meta input:focus {
            box-shadow: 0 0 0 3px rgba(242, 218, 152, 0.28);
        }

        .session-history {
            border-top: 2px solid rgba(209, 176, 79, 0.4);
            padding-top: 14px;
            text-align: left;
        }

        .session-history-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .data-tools {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }

        .data-tools button {
            font-family: 'Press Start 2P', monospace;
            border: 2px solid var(--edge);
            border-radius: 7px;
            background: #2a3d27;
            color: var(--text);
            cursor: pointer;
            padding: 9px 10px;
            font-size: 0.52rem;
            box-shadow: 0 0 10px rgba(209, 176, 79, 0.2);
            transition: transform 0.12s ease, filter 0.2s ease;
        }

        #exportCsvBtn {
            background: #7a6530;
        }

        #pruneOldBtn {
            background: #5f9a52;
        }

        #clearDataBtn {
            background: #a3472d;
        }

        .session-history h2 {
            margin: 0;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.68rem;
            color: var(--title);
            line-height: 1.5;
        }

        #viewSessionsBtn {
            font-family: 'Press Start 2P', monospace;
            border: 2px solid var(--edge);
            border-radius: 6px;
            background: #7a6530;
            color: var(--text);
            cursor: pointer;
            padding: 6px 8px;
            font-size: 0.42rem;
            line-height: 1.2;
        }

        .sessions-modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: var(--modal-overlay);
            z-index: 1000;
        }

        .sessions-modal.open {
            display: flex;
        }

        .sessions-modal-panel {
            width: min(92vw, 620px);
            max-height: min(78vh, 720px);
            overflow: auto;
            background: linear-gradient(180deg, var(--card-top) 0%, var(--panel) 100%);
            border: 3px solid var(--edge);
            border-radius: 10px;
            box-shadow:
                0 0 0 3px rgba(209, 176, 79, 0.24),
                0 0 30px rgba(209, 176, 79, 0.22),
                0 18px 26px rgba(0, 0, 0, 0.48);
            padding: 18px 16px 14px;
        }

        .sessions-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .sessions-modal-title {
            margin: 0;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.62rem;
            color: var(--title);
            line-height: 1.5;
        }

        .sessions-modal-close {
            font-family: 'Press Start 2P', monospace;
            border: 2px solid var(--edge);
            border-radius: 7px;
            background: #a3472d;
            color: var(--text);
            cursor: pointer;
            padding: 6px 8px;
            font-size: 0.45rem;
        }

        #modalSessionsList {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 7px;
            max-height: 58vh;
            overflow: auto;
        }

        #modalSessionsList li {
            background: var(--list-bg);
            border: 1px solid var(--list-border);
            border-radius: 6px;
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .session-row-text {
            min-width: 0;
        }

        .session-row-title {
            margin: 0;
            font-size: 1rem;
            color: var(--list-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-row-meta {
            margin: 2px 0 0;
            font-size: 0.9rem;
            color: rgba(247, 240, 207, 0.82);
        }

        .session-row-actions button {
            font-family: 'Press Start 2P', monospace;
            border: 2px solid var(--edge);
            border-radius: 6px;
            background: #7a6530;
            color: var(--text);
            cursor: pointer;
            padding: 6px 8px;
            font-size: 0.45rem;
        }

        #todayCount {
            margin: 0 0 8px;
            font-size: 1.08rem;
            color: var(--text);
        }

        #historyList {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 7px;
            max-height: 180px;
            overflow: auto;
        }

        #historyList li {
            background: var(--list-bg);
            border: 1px solid var(--list-border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 1rem;
            color: var(--list-text);
        }

        #historyList li.empty {
            text-align: center;
            opacity: 0.8;
        }

        #startButton { background-color: var(--start); }
        #pauseButton { background-color: var(--pause); }
        #resetButton { background-color: var(--reset); }

        .controls button:hover,
        .mode-selector button:hover,
        .theme-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.06);
        }

        .controls button:active,
        .mode-selector button:active,
        .theme-btn:active {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            45% { opacity: 0.86; }
            50% { opacity: 0.98; }
            55% { opacity: 0.9; }
        }
    </style>
</head>
<body>

    <nav class="theme-nav" aria-label="Theme selector">
        <button class="theme-btn active" type="button" data-theme="zelda">Legend of Zelda</button>
        <button class="theme-btn" type="button" data-theme="mario">Super Mario Bros</button>
        <button class="theme-btn" type="button" data-theme="donkeykong">Donkey Kong</button>
        <button class="theme-btn" type="button" data-theme="castlevania">Castlevania</button>
    </nav>

    <div class="timer-container">
        <h1>Pomodoro Timer</h1>
        <div class="mode-selector">
            <button id="workModeBtn" class="active">Work</button>
            <button id="breakModeBtn">Break</button>
            <!-- <button id="testModeBtn">Test: Off</button> -->
        </div>
        <div class="session-meta">
            <label for="sessionTitleInput">Session Title</label>
            <input id="sessionTitleInput" type="text" maxlength="48" placeholder="Deep Work, Study, Planning...">
        </div>
        <div id="timerDisplay">25:00</div>
        <div class="controls">
            <button id="startButton">Start</button>
            <button id="pauseButton" disabled>Pause</button>
            <button id="resetButton">Reset</button>
        </div>
        <div class="session-history">
            <div class="session-history-header">
                <h2>Session History</h2>
                <button id="viewSessionsBtn" type="button">View Sessions</button>
            </div>
            <p id="todayCount">Today: 0 sessions</p>
            <ul id="historyList"></ul>
            <div class="data-tools">
                <button id="exportCsvBtn">Export CSV</button>
                <button id="pruneOldBtn">Keep Last 90 Days</button>
                <button id="clearDataBtn">Clear History</button>
            </div>
        </div>
    </div>

    <div id="sessionsModal" class="sessions-modal" aria-hidden="true">
        <div class="sessions-modal-panel" role="dialog" aria-modal="true" aria-labelledby="sessionsModalTitle">
            <div class="sessions-modal-header">
                <h2 id="sessionsModalTitle" class="sessions-modal-title">Saved Sessions</h2>
                <button id="closeSessionsModalBtn" class="sessions-modal-close" type="button">Close</button>
            </div>
            <ul id="modalSessionsList"></ul>
        </div>
    </div>

    <footer>
        <p style="margin-top: 30px; font-size: 0.75rem; color: #666;">Yeti Games, LLC</p>
    </footer>


    <script>
        const WORKS_BEFORE_LONG_BREAK = 4;
        const DEFAULT_DURATIONS = {
            work: 25 * 60,
            shortBreak: 5 * 60,
            longBreak: 30 * 60
        };
        const TEST_DURATIONS = {
            work: 10,
            shortBreak: 5,
            longBreak: 8
        };
        const THEMES = {
            zelda: {
                bgTop: '#133b2c',
                bgBottom: '#0a1b14',
                panel: '#1f2f1f',
                edge: '#d1b04f',
                text: '#f7f0cf',
                timer: '#f5d97a',
                start: '#5f9a52',
                pause: '#d1b04f',
                reset: '#a3472d',
                active: '#3e7f49',
                cardTop: '#2a3d27',
                title: '#e7c566',
                titleGlow: 'rgba(231, 197, 102, 0.65)',
                controlBorder: '#f2da98',
                controlText: '#1a160b',
                controlBase: '#e8dfb8',
                label: '#f2da98',
                inputBg: '#f7f0cf',
                inputText: '#1a160b',
                listBg: 'rgba(247, 240, 207, 0.1)',
                listBorder: 'rgba(242, 218, 152, 0.34)',
                listText: '#f5e7bc',
                modalOverlay: 'rgba(10, 12, 10, 0.72)'
            },
            mario: {
                bgTop: '#7ec8ff',
                bgBottom: '#2f6cc8',
                panel: '#e63b2f',
                edge: '#ffd34d',
                text: '#fff8db',
                timer: '#fff3a2',
                start: '#32a852',
                pause: '#ffd34d',
                reset: '#cf3d2b',
                active: '#2f8de4',
                cardTop: '#ff5a45',
                title: '#fff3a2',
                titleGlow: 'rgba(255, 211, 77, 0.7)',
                controlBorder: '#ffe07d',
                controlText: '#5c2409',
                controlBase: '#ffdca0',
                label: '#fff3a2',
                inputBg: '#fff7d8',
                inputText: '#5c2409',
                listBg: 'rgba(255, 248, 219, 0.14)',
                listBorder: 'rgba(255, 224, 125, 0.5)',
                listText: '#fff8db',
                modalOverlay: 'rgba(24, 35, 81, 0.62)'
            },
            donkeykong: {
                bgTop: '#0c0f15',
                bgBottom: '#040508',
                panel: '#5a1720',
                edge: '#5ec9ff',
                text: '#ffe9a8',
                timer: '#ffd84a',
                start: '#4ea44a',
                pause: '#5ec9ff',
                reset: '#b13a2a',
                active: '#f04a3a',
                cardTop: '#7a1f2b',
                title: '#ffd84a',
                titleGlow: 'rgba(255, 216, 74, 0.72)',
                controlBorder: '#6dd6ff',
                controlText: '#241508',
                controlBase: '#ffd27a',
                label: '#ffd84a',
                inputBg: '#ffe8b7',
                inputText: '#2b1809',
                listBg: 'rgba(240, 74, 58, 0.18)',
                listBorder: 'rgba(109, 214, 255, 0.52)',
                listText: '#ffe9a8',
                modalOverlay: 'rgba(2, 3, 5, 0.82)'
            },
            castlevania: {
                bgTop: '#18263f',
                bgBottom: '#0a111f',
                panel: '#151f34',
                edge: '#9faec8',
                text: '#e5e9f2',
                timer: '#d9e2ff',
                start: '#3a6e60',
                pause: '#9faec8',
                reset: '#8f2b3c',
                active: '#9e2f4d',
                cardTop: '#1f2d49',
                title: '#c8d4ec',
                titleGlow: 'rgba(200, 212, 236, 0.62)',
                controlBorder: '#b8c5dd',
                controlText: '#1c2437',
                controlBase: '#dde3f0',
                label: '#c8d4ec',
                inputBg: '#edf1f9',
                inputText: '#1c2437',
                listBg: 'rgba(229, 233, 242, 0.1)',
                listBorder: 'rgba(184, 197, 221, 0.42)',
                listText: '#e5e9f2',
                modalOverlay: 'rgba(7, 12, 24, 0.76)'
            }
        };

        let isTestMode = false;
        let selectedTheme = 'zelda';
        let completedWorkStreak = 0;
        let time = DEFAULT_DURATIONS.work;
        let isRunning = false;
        let intervalId = null;
        let currentMode = 'work'; // 'work' or 'break'
        let audioContext = null;
        let activeSessionTitle = 'Untitled Session';
        const STORAGE_KEY = 'pomodoroCompletedSessions';
        const APP_STATE_KEY = 'pomodoroAppState';
        let completedSessions = loadCompletedSessions();

        // DOM Elements
        const display = document.getElementById('timerDisplay');
        const startButton = document.getElementById('startButton');
        const pauseButton = document.getElementById('pauseButton');
        const resetButton = document.getElementById('resetButton');
        const workModeBtn = document.getElementById('workModeBtn');
        const breakModeBtn = document.getElementById('breakModeBtn');
        const testModeBtn = document.getElementById('testModeBtn');
        const sessionTitleInput = document.getElementById('sessionTitleInput');
        const todayCount = document.getElementById('todayCount');
        const historyList = document.getElementById('historyList');
        const sessionsModal = document.getElementById('sessionsModal');
        const viewSessionsBtn = document.getElementById('viewSessionsBtn');
        const closeSessionsModalBtn = document.getElementById('closeSessionsModalBtn');
        const modalSessionsList = document.getElementById('modalSessionsList');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const pruneOldBtn = document.getElementById('pruneOldBtn');
        const clearDataBtn = document.getElementById('clearDataBtn');
        const themeButtons = document.querySelectorAll('.theme-btn');

        // --- Functions ---

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        function updateDisplay() {
            display.textContent = formatTime(time);
        }

        function getDurations() {
            return isTestMode ? TEST_DURATIONS : DEFAULT_DURATIONS;
        }

        function getWorkSeconds() {
            return getDurations().work;
        }

        function getShortBreakSeconds() {
            return getDurations().shortBreak;
        }

        function getLongBreakSeconds() {
            return getDurations().longBreak;
        }

        function setIdleButtonState() {
            startButton.disabled = false;
            pauseButton.disabled = true;
            resetButton.disabled = false;
        }

        function applyModeButtonState() {
            if (currentMode === 'work') {
                workModeBtn.classList.add('active');
                breakModeBtn.classList.remove('active');
            } else {
                breakModeBtn.classList.add('active');
                workModeBtn.classList.remove('active');
            }
        }

        function applyTestModeButtonState() {
            if (!testModeBtn) return;
            testModeBtn.classList.toggle('active', isTestMode);
            testModeBtn.textContent = isTestMode ? 'Test: On' : 'Test: Off';
        }

        function saveAppState() {
            const appState = {
                currentMode,
                time,
                completedWorkStreak,
                isTestMode,
                selectedTheme,
                activeSessionTitle,
                sessionTitleInputValue: sessionTitleInput.value
            };
            localStorage.setItem(APP_STATE_KEY, JSON.stringify(appState));
        }

        function applyTheme(themeName) {
            const theme = THEMES[themeName] || THEMES.zelda;
            selectedTheme = THEMES[themeName] ? themeName : 'zelda';
            const root = document.documentElement;

            root.style.setProperty('--bg-top', theme.bgTop);
            root.style.setProperty('--bg-bottom', theme.bgBottom);
            root.style.setProperty('--panel', theme.panel);
            root.style.setProperty('--edge', theme.edge);
            root.style.setProperty('--text', theme.text);
            root.style.setProperty('--timer', theme.timer);
            root.style.setProperty('--start', theme.start);
            root.style.setProperty('--pause', theme.pause);
            root.style.setProperty('--reset', theme.reset);
            root.style.setProperty('--active', theme.active);
            root.style.setProperty('--card-top', theme.cardTop);
            root.style.setProperty('--title', theme.title);
            root.style.setProperty('--title-glow', theme.titleGlow);
            root.style.setProperty('--control-border', theme.controlBorder);
            root.style.setProperty('--control-text', theme.controlText);
            root.style.setProperty('--control-base', theme.controlBase);
            root.style.setProperty('--label', theme.label);
            root.style.setProperty('--input-bg', theme.inputBg);
            root.style.setProperty('--input-text', theme.inputText);
            root.style.setProperty('--list-bg', theme.listBg);
            root.style.setProperty('--list-border', theme.listBorder);
            root.style.setProperty('--list-text', theme.listText);
            root.style.setProperty('--modal-overlay', theme.modalOverlay);

            themeButtons.forEach((button) => {
                button.classList.toggle('active', button.dataset.theme === selectedTheme);
            });
        }

        function loadAppState() {
            try {
                const raw = localStorage.getItem(APP_STATE_KEY);
                if (!raw) return;
                const parsed = JSON.parse(raw);
                if (!parsed || typeof parsed !== 'object') return;

                if (typeof parsed.isTestMode === 'boolean') {
                    isTestMode = parsed.isTestMode;
                }
                if (typeof parsed.selectedTheme === 'string' && THEMES[parsed.selectedTheme]) {
                    selectedTheme = parsed.selectedTheme;
                }

                if (parsed.currentMode === 'work' || parsed.currentMode === 'break') {
                    currentMode = parsed.currentMode;
                }
                if (typeof parsed.time === 'number' && Number.isFinite(parsed.time) && parsed.time > 0) {
                    time = Math.floor(parsed.time);
                } else {
                    time = currentMode === 'work' ? getWorkSeconds() : getShortBreakSeconds();
                }
                if (typeof parsed.completedWorkStreak === 'number' && Number.isFinite(parsed.completedWorkStreak)) {
                    completedWorkStreak = Math.max(0, Math.floor(parsed.completedWorkStreak));
                }
                if (typeof parsed.activeSessionTitle === 'string') {
                    activeSessionTitle = parsed.activeSessionTitle;
                }
                if (typeof parsed.sessionTitleInputValue === 'string') {
                    sessionTitleInput.value = parsed.sessionTitleInputValue;
                }
            } catch (error) {
                // Ignore invalid persisted app state
            }
        }

        function toggleTestMode() {
            isTestMode = !isTestMode;
            applyTestModeButtonState();

            if (!isRunning) {
                if (currentMode === 'work') {
                    time = getWorkSeconds();
                } else {
                    time = getShortBreakSeconds();
                }
                updateDisplay();
            }

            saveAppState();
        }

        function getDateKey(date = new Date()) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateKey(dateKey) {
            return new Date(`${dateKey}T00:00:00`).toLocaleDateString(undefined, {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function createSessionId() {
            return `session-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
        }

        function normalizeSession(session) {
            if (!session || typeof session !== 'object') return null;
            if (typeof session.dateKey !== 'string' || typeof session.title !== 'string') return null;

            const normalized = {
                id: typeof session.id === 'string' && session.id ? session.id : createSessionId(),
                dateKey: session.dateKey,
                title: session.title,
                completedAt: typeof session.completedAt === 'string' && session.completedAt
                    ? session.completedAt
                    : `${session.dateKey}T12:00:00.000Z`
            };

            return normalized;
        }

        function formatCompletedAt(completedAt) {
            const date = new Date(completedAt);
            if (Number.isNaN(date.getTime())) return 'Unknown time';
            return date.toLocaleString(undefined, {
                month: 'short',
                day: 'numeric',
                hour: 'numeric',
                minute: '2-digit'
            });
        }

        function loadCompletedSessions() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (!stored) return [];
                const parsed = JSON.parse(stored);
                if (!Array.isArray(parsed)) return [];
                return parsed
                    .map(normalizeSession)
                    .filter((session) => Boolean(session));
            } catch (error) {
                return [];
            }
        }

        function saveCompletedSessions() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(completedSessions));
        }

        function recordCompletedWorkSession(title) {
            completedSessions.push({
                id: createSessionId(),
                dateKey: getDateKey(),
                title: title,
                completedAt: new Date().toISOString()
            });

            if (completedSessions.length > 500) {
                completedSessions = completedSessions.slice(-500);
            }

            saveCompletedSessions();
            renderSessionHistory();
        }

        function getSortedSessions() {
            return [...completedSessions].sort((a, b) => {
                const aTime = new Date(a.completedAt).getTime();
                const bTime = new Date(b.completedAt).getTime();
                return bTime - aTime;
            });
        }

        function renderSessionsModal() {
            if (!modalSessionsList) return;

            modalSessionsList.innerHTML = '';
            if (!completedSessions.length) {
                const emptyItem = document.createElement('li');
                emptyItem.className = 'empty';
                emptyItem.textContent = 'No sessions to show.';
                modalSessionsList.appendChild(emptyItem);
                return;
            }

            const sortedSessions = getSortedSessions();

            sortedSessions.forEach((session) => {
                const row = document.createElement('li');

                const textWrap = document.createElement('div');
                textWrap.className = 'session-row-text';

                const title = document.createElement('p');
                title.className = 'session-row-title';
                title.textContent = session.title || 'Untitled Session';

                const meta = document.createElement('p');
                meta.className = 'session-row-meta';
                meta.textContent = formatCompletedAt(session.completedAt);

                textWrap.appendChild(title);
                textWrap.appendChild(meta);

                const actions = document.createElement('div');
                actions.className = 'session-row-actions';

                const editBtn = document.createElement('button');
                editBtn.textContent = 'Edit';
                editBtn.type = 'button';
                editBtn.dataset.sessionId = session.id;

                actions.appendChild(editBtn);
                row.appendChild(textWrap);
                row.appendChild(actions);
                modalSessionsList.appendChild(row);
            });
        }

        function openSessionsModal() {
            renderSessionsModal();
            sessionsModal.classList.add('open');
            sessionsModal.setAttribute('aria-hidden', 'false');
        }

        function closeSessionsModal() {
            sessionsModal.classList.remove('open');
            sessionsModal.setAttribute('aria-hidden', 'true');
        }

        function pruneOldSessions(daysToKeep = 90) {
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - daysToKeep);
            const cutoffKey = getDateKey(cutoff);
            completedSessions = completedSessions.filter((session) => session.dateKey >= cutoffKey);
            saveCompletedSessions();
            renderSessionHistory();
        }

        function clearAllSessionData() {
            completedSessions = [];
            saveCompletedSessions();
            renderSessionHistory();
        }

        function renderSessionHistory() {
            const todayKey = getDateKey();
            const groupedByDay = completedSessions.reduce((accumulator, session) => {
                if (!accumulator[session.dateKey]) {
                    accumulator[session.dateKey] = [];
                }
                accumulator[session.dateKey].push(session);
                return accumulator;
            }, {});

            const todaySessions = groupedByDay[todayKey] || [];
            todayCount.textContent = `Today: ${todaySessions.length} session${todaySessions.length === 1 ? '' : 's'}`;

            historyList.innerHTML = '';

            const dateKeys = Object.keys(groupedByDay).sort((a, b) => b.localeCompare(a));
            if (!dateKeys.length) {
                const emptyItem = document.createElement('li');
                emptyItem.className = 'empty';
                emptyItem.textContent = 'No completed work sessions yet.';
                historyList.appendChild(emptyItem);
                return;
            }

            dateKeys.slice(0, 7).forEach((dateKey) => {
                const sessions = groupedByDay[dateKey];
                const titles = sessions.slice(-3).map((session) => session.title).join(', ');
                const row = document.createElement('li');
                row.textContent = `${formatDateKey(dateKey)}: ${sessions.length} session${sessions.length === 1 ? '' : 's'}${titles ? ` - ${titles}` : ''}`;
                historyList.appendChild(row);
            });
        }

        function playAlarmSound() {
            if (!audioContext) {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                audioContext = new AudioContextClass();
            }

            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            const beepPattern = [
                { freq: 880, start: 0, duration: 0.16 },
                { freq: 988, start: 0.24, duration: 0.16 },
                { freq: 1175, start: 0.48, duration: 0.24 }
            ];

            const baseTime = audioContext.currentTime;
            beepPattern.forEach((note) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(note.freq, baseTime + note.start);

                gainNode.gain.setValueAtTime(0.0001, baseTime + note.start);
                gainNode.gain.exponentialRampToValueAtTime(0.24, baseTime + note.start + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, baseTime + note.start + note.duration);

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.start(baseTime + note.start);
                oscillator.stop(baseTime + note.start + note.duration + 0.02);
            });
        }

        function startTimer() {
            if (isRunning) return; // Prevent starting if already running

            activeSessionTitle = sessionTitleInput.value.trim() || 'Untitled Session';

            isRunning = true;

            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // Update button states
            startButton.disabled = true;
            pauseButton.disabled = false;

            // Update mode button states
            applyModeButtonState();

            intervalId = setInterval(() => {
                time--;
                updateDisplay();

                if (time <= 0) {
                    clearInterval(intervalId);
                    isRunning = false;
                    playAlarmSound();

                    if (currentMode === 'work') {
                        recordCompletedWorkSession(sessionTitleInput.value.trim() || 'Untitled Session');
                        completedWorkStreak++;
                        const shouldTakeLongBreak = completedWorkStreak % WORKS_BEFORE_LONG_BREAK === 0;
                        switchToBreakMode(shouldTakeLongBreak ? getLongBreakSeconds() : getShortBreakSeconds());
                    } else {
                        switchToWorkMode();
                    }
                }

                saveAppState();
            }, 1000);

            saveAppState();
        }

        function pauseTimer() {
            if (!isRunning) return;
            
            clearInterval(intervalId);
            isRunning = false;

            // Update button states
            startButton.disabled = false;
            pauseButton.disabled = true;
            saveAppState();
        }

        function resetTimer() {
            clearInterval(intervalId);
            isRunning = false;
            time = getWorkSeconds();
            updateDisplay();
            setIdleButtonState();
            saveAppState();
        }

        function switchToBreakMode(breakDuration = getShortBreakSeconds()) {
            clearInterval(intervalId);
            isRunning = false;
            currentMode = 'break';
            time = breakDuration;
            updateDisplay();
            workModeBtn.classList.remove('active');
            breakModeBtn.classList.add('active');
            setIdleButtonState();
            saveAppState();
        }

        function switchToWorkMode() {
            clearInterval(intervalId);
            isRunning = false;
            currentMode = 'work';
            time = getWorkSeconds();
            updateDisplay();
            workModeBtn.classList.add('active');
            breakModeBtn.classList.remove('active');
            setIdleButtonState();
            saveAppState();
        }

        function exportDataAsCSV() {
            // Retrieve data from localStorage (assuming you store your session data here)
            const data = JSON.parse(localStorage.getItem('pomodoroCompletedSessions')) || [];

            if (data.length === 0) {
                alert("No session data found to export.");
                return;
            }

            // Create CSV content
            let csvContent = "Session Data\n";
            csvContent += "Date,Title,Completed At\n";

            // Add data rows
            data.forEach(session => {
                const completedAt = session.completedAt ? new Date(session.completedAt).toLocaleString() : '';
                const row = [
                    session.dateKey || '',
                    `"${(session.title || '').replace(/"/g, '""')}"`,
                    `"${completedAt.replace(/"/g, '""')}"`
                ].join(',');
                csvContent += row + "\n";
            });

            // Create a Blob and trigger download
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "session_data_" + new Date().toISOString().split('T')[0] + ".csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- Event Listeners ---

        startButton.addEventListener('click', startTimer);
        pauseButton.addEventListener('click', pauseTimer);
        resetButton.addEventListener('click', resetTimer);
        workModeBtn.addEventListener('click', switchToWorkMode);
        breakModeBtn.addEventListener('click', switchToBreakMode);
        if (testModeBtn) {
            testModeBtn.addEventListener('click', toggleTestMode);
        }

        themeButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const themeName = button.dataset.theme;
                applyTheme(themeName);
                saveAppState();
            });
        });

        exportCsvBtn.addEventListener('click', exportDataAsCSV);
        pruneOldBtn.addEventListener('click', () => pruneOldSessions(90));
        clearDataBtn.addEventListener('click', () => {
            const confirmed = window.confirm('Clear all saved session history?');
            if (confirmed) {
                clearAllSessionData();
            }
        });

        viewSessionsBtn.addEventListener('click', openSessionsModal);
        closeSessionsModalBtn.addEventListener('click', closeSessionsModal);
        sessionsModal.addEventListener('click', (event) => {
            if (event.target === sessionsModal) {
                closeSessionsModal();
            }
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape' && sessionsModal.classList.contains('open')) {
                closeSessionsModal();
            }
        });

        modalSessionsList.addEventListener('click', (event) => {
            const target = event.target;
            if (!(target instanceof HTMLButtonElement)) return;

            const sessionId = target.dataset.sessionId;
            if (!sessionId) return;

            const index = completedSessions.findIndex((session) => session.id === sessionId);
            if (index === -1) return;

            const currentTitle = completedSessions[index].title || 'Untitled Session';
            const updatedTitle = window.prompt('Edit session title:', currentTitle);
            if (updatedTitle === null) return;

            const nextTitle = updatedTitle.trim() || 'Untitled Session';
            completedSessions[index].title = nextTitle;
            saveCompletedSessions();
            renderSessionHistory();
            renderSessionsModal();
        });

        sessionTitleInput.addEventListener('input', () => {
            activeSessionTitle = sessionTitleInput.value.trim() || 'Untitled Session';
            saveAppState();
        });

        // Initial setup display
        loadAppState();
        applyTheme(selectedTheme);
        applyTestModeButtonState();
        applyModeButtonState();
        updateDisplay();
        renderSessionHistory();
        setIdleButtonState();

    </script>

</body>
